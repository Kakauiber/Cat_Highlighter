<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>划线猫 - 侧边栏</title>
    <link rel="stylesheet" href="sidepanel.css" />
</head>

<body>
    <div id="sidepanel-container">
        <header class="header">
            <h1 class="title">🐱 划线猫</h1>
            <div class="header-actions">
                <button id="select-mode-btn" class="header-btn" title="多选">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                </button>
                <button id="manage-btn" class="header-btn" title="管理页">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </header>

        <!-- Batch selection header (hidden by default) -->
        <div id="batch-header" class="batch-header hidden">
            <label class="select-all-label">
                <input type="checkbox" id="select-all-checkbox" />
                <span id="select-count">已选 0 条（勾选前框可全选）</span>
            </label>
            <button id="cancel-select-btn" class="cancel-btn">取消</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="current">当前页面</button>
            <button class="tab-btn" data-tab="all">全部高亮</button>
        </div>

        <div id="current-tab" class="tab-content active">
            <div id="current-page-info" class="page-info"></div>

            <!-- 当前页高亮 section -->
            <div id="highlight-section" class="accordion-section">
                <div id="highlight-section-header" class="accordion-section-header">
                    <span class="accordion-section-title">当前页高亮</span>
                    <span id="highlight-section-summary" class="accordion-section-summary"></span>
                    <span class="accordion-toggle">▶</span>
                </div>
                <div id="highlight-section-body" class="accordion-section-body">
                    <div id="current-highlights" class="highlights-list"></div>
                </div>
            </div>

            <!-- 当前页笔记 section -->
            <div id="note-section" class="accordion-section collapsed">
                <div id="note-section-header" class="accordion-section-header">
                    <span class="accordion-section-title">当前页笔记</span>
                    <span id="note-summary" class="accordion-section-summary">暂无笔记</span>
                    <span class="accordion-toggle">▶</span>
                </div>
                <div id="note-section-body" class="accordion-section-body">
                    <div class="note-status-bar">
                        <span id="note-save-status" class="note-save-status"></span>
                        <span id="note-update-time" class="note-update-time"></span>
                    </div>
                    <textarea id="note-textarea" class="note-textarea"
                        placeholder="随手记下你的想法或待追问点"></textarea>
                    <div class="note-footer">
                        <span id="note-word-count" class="note-word-count">0 字</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="all-tab" class="tab-content">
            <div class="all-tab-search">
                <input id="search-input" type="text" placeholder="搜索高亮内容..." />
            </div>
            <div id="all-pages-list" class="pages-list"></div>
        </div>
    </div>

    <!-- Batch action bar (hidden by default) -->
    <div id="batch-action-bar" class="batch-action-bar hidden">
        <button id="batch-delete-btn" class="batch-btn danger"><svg viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg> 删除所选</button>
        <button id="batch-copy-btn" class="batch-btn primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg> 合并复制</button>
        <button id="batch-export-btn" class="batch-btn secondary hidden"><svg viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg> 导出所选</button>
    </div>

    <script src="note-repo.js"></script>
    <script src="page-note-service.js"></script>
    <script src="sidepanel.js"></script>
</body>

</html>
